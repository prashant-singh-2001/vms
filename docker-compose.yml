name: vms

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:8554"

  rtsp-source:
    build:
      context: ./infra/rtsp-source
    restart: unless-stopped
    environment:
      SAMPLE_VIDEO_URL: ${SAMPLE_VIDEO_URL}
      RTSP_TARGET: rtsp://mediamtx:8554/test
    volumes:
      - rtsp-assets:/assets
    depends_on:
      - mediamtx

  detector:
    build:
      context: ./detector
    restart: unless-stopped
    environment:
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      PORT: ${DETECTOR_PORT:-8000}
    ports:
      - "${DETECTOR_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL}
      DETECTOR_URL: ${DETECTOR_URL}
      HTTP_ADDR: ${WORKER_HTTP_ADDR:-:8080}
      DEDUP_COOLDOWN_SEC: ${DEDUP_COOLDOWN_SEC:-10}
      MAX_EVENTS_PER_MIN: ${MAX_EVENTS_PER_MIN:-6}
      DETECTION_SAMPLE_FPS: ${DETECTION_SAMPLE_FPS:-5}
      WEBRTC_UDP_PORT_MIN: ${WEBRTC_UDP_PORT_MIN:-40000}
      WEBRTC_UDP_PORT_MAX: ${WEBRTC_UDP_PORT_MAX:-40100}
      WEBRTC_PUBLIC_IP: ${WEBRTC_PUBLIC_IP:-127.0.0.1}
    ports:
      - "8080:8080"
      - "40000-40100:40000-40100/udp"
    depends_on:
      redis:
        condition: service_healthy
      detector:
        condition: service_healthy

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PORT: ${API_PORT:-3000}
      WORKER_INTERNAL_URL: ${WORKER_INTERNAL_URL}
      SEED_USERNAME: ${SEED_USERNAME}
      SEED_PASSWORD: ${SEED_PASSWORD}
      SEED_RTSP_URL: rtsp://mediamtx:8554/test
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  pgdata:
  rtsp-assets:
